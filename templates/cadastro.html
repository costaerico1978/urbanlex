<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanLex — Criar Cadastro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c0f;--surface:#111418;--border:#1f2830;--accent:#00e5a0;--accent2:#00b880;--text:#e8edf2;--muted:#6b7d8f;--red:#ff4d6d;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 0;position:relative}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.glow{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(0,229,160,0.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px;position:relative;z-index:1}
.logo-area{text-align:center;margin-bottom:28px}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,rgba(0,229,160,0.2),rgba(0,229,160,0.05));border:1px solid rgba(0,229,160,0.3);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
.logo-icon svg{width:24px;height:24px;color:var(--accent)}
.wordmark{font-family:var(--font-head);font-size:24px;font-weight:800;color:var(--text)}
.wordmark span{color:var(--accent)}
.tagline{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:4px}
.form-group{margin-bottom:14px}
label{display:block;font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
input{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:11px 14px;font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,0.08)}
.input-wrap{position:relative}
.input-wrap input{padding-right:42px}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px}
.senha-req{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:5px}
.req{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;color:var(--muted);transition:color .2s}
.req .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .2s}
.req.ok{color:var(--accent)}
.req.ok .dot{background:var(--accent)}
.btn{width:100%;background:var(--accent);color:#0a0c0f;border:none;border-radius:8px;padding:12px;font-family:var(--font-head);font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:20px}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-top:14px;display:none}
.msg.erro{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.2);color:var(--red)}
.msg.ok{background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);color:var(--accent)}
.link-back{text-align:center;margin-top:18px;font-size:12px;color:var(--muted)}
.link-back a{color:var(--accent);text-decoration:none}
.version-tag{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:var(--muted);opacity:.5}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
<div class="logo-area">
<div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6"/></svg></div>
<div class="wordmark">Urban<span>Lex</span></div>
<div class="tagline">Criar Cadastro</div>
</div>
<div class="form-group"><label>Nome completo *</label><input type="text" id="c-nome" placeholder="Ex: João Silva"></div>
<div class="form-group"><label>E-mail *</label><input type="email" id="c-email" placeholder="Ex: joao@empresa.com"></div>
<div class="form-group">
<label>Senha *</label>
<div class="input-wrap">
<input type="password" id="c-senha" placeholder="Crie uma senha forte" oninput="verificarSenha()">
<button type="button" class="eye-btn" onclick="toggleOlho('c-senha','eye1')"><svg id="eye1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
</div>
<div class="senha-req">
<div class="req" id="req-len"><div class="dot"></div>8 a 20 caracteres</div>
<div class="req" id="req-mai"><div class="dot"></div>Letra maiúscula</div>
<div class="req" id="req-min"><div class="dot"></div>Letra minúscula</div>
<div class="req" id="req-num"><div class="dot"></div>Número</div>
<div class="req" id="req-esp"><div class="dot"></div>Caractere especial</div>
</div>
</div>
<div class="form-group">
<label>Confirmação de senha *</label>
<div class="input-wrap">
<input type="password" id="c-senha2" placeholder="Repita a senha" oninput="verificarConfirmacao()">
<button type="button" class="eye-btn" onclick="toggleOlho('c-senha2','eye2')"><svg id="eye2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
</div>
</div>
<div id="msg" class="msg"></div>
<button class="btn" id="btn-cad" onclick="cadastrar()">Confirmar Cadastro</button>
<div class="link-back">Já tem conta? <a href="/login">Entrar</a></div>
</div>
<div class="version-tag">v1.3+2.3 · UrbanLex</div>
<script>
function toggleOlho(id,ico){const i=document.getElementById(id),s=document.getElementById(ico);if(i.type==='password'){i.type='text';s.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';}else{i.type='password';s.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}}
function setReq(id,ok){const e=document.getElementById(id);ok?e.classList.add('ok'):e.classList.remove('ok');}
function verificarSenha(){const s=document.getElementById('c-senha').value;setReq('req-len',s.length>=8&&s.length<=20);setReq('req-mai',/[A-Z]/.test(s));setReq('req-min',/[a-z]/.test(s));setReq('req-num',/\d/.test(s));setReq('req-esp',/[@$!%*?&\-_#]/.test(s));verificarConfirmacao();}
function verificarConfirmacao(){const s=document.getElementById('c-senha').value,s2=document.getElementById('c-senha2').value,i=document.getElementById('c-senha2');if(!s2.length){i.style.borderColor='';return;}i.style.borderColor=s===s2?'var(--accent)':'var(--red)';}
function senhaValida(){const s=document.getElementById('c-senha').value;return s.length>=8&&s.length<=20&&/[A-Z]/.test(s)&&/[a-z]/.test(s)&&/\d/.test(s)&&/[@$!%*?&\-_#]/.test(s);}
function showMsg(t,tp){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+tp;m.style.display='block';}
async function cadastrar(){
const nome=document.getElementById('c-nome').value.trim(),email=document.getElementById('c-email').value.trim(),senha=document.getElementById('c-senha').value,senha2=document.getElementById('c-senha2').value,btn=document.getElementById('btn-cad');
if(!nome||!email||!senha){showMsg('Preencha todos os campos.','erro');return;}
if(!senhaValida()){showMsg('A senha não atende a todos os requisitos.','erro');return;}
if(senha!==senha2){showMsg('As senhas não coincidem.','erro');return;}
btn.disabled=true;btn.textContent='Enviando...';
try{const r=await fetch('/api/auth/cadastrar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,email,senha})});const d=await r.json();
if(d.success){showMsg('✅ Seu cadastro foi realizado com sucesso. Aguarde a aprovação do Administrador. Você receberá um e-mail quando seu acesso estiver liberado.','ok');btn.textContent='Cadastro Enviado';}
else{showMsg('Erro: '+(d.error||'desconhecido'),'erro');btn.disabled=false;btn.textContent='Confirmar Cadastro';}}
catch(e){showMsg('Erro de conexão.','erro');btn.disabled=false;btn.textContent='Confirmar Cadastro';}}
</script>
</body>
</html>
