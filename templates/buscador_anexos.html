{% extends "base.html" %}
<script>
let _anx_log_buffer = [];

function _anx_addLog(msg, nivel) {
    const logEl = document.getElementById('anx-log');
    const c = nivel === 'erro' ? '#ff6b6b' : nivel === 'aviso' ? '#ffb347' : nivel === 'ok' ? 'var(--accent)' : nivel === 'relacao' ? '#4fc3f7' : nivel === 'anexo' ? '#ff9800' : 'var(--muted)';
    const ts = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/Sao_Paulo'});
    const txt = `[${ts}] ${msg||''}`;
    _anx_log_buffer.push(txt);
    logEl.innerHTML += `<div style="color:${c}">${txt}</div>`;
    logEl.scrollTop = logEl.scrollHeight;
    // Persistir no localStorage
    try { localStorage.setItem('anx_log_cache', JSON.stringify(_anx_log_buffer)); } catch(e) {}
}

function novaAnalise() {
    _anx_log_buffer = [];
    localStorage.removeItem('anx_log_cache');
    const logEl = document.getElementById('anx-log');
    logEl.innerHTML = '';
    logEl.style.display = 'none';
    document.getElementById('anx-resultado').style.display = 'none';
    document.getElementById('btn-baixar-anx').style.display = 'none';
    document.getElementById('anx-arquivo').value = '';
}

function baixarLogAnexo() {
    const txt = _anx_log_buffer.join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([txt], {type:'text/plain'}));
    const nd = new Date();
    a.download = 'Log_anexos_' + nd.getDate().toString().padStart(2,'0') + '_' + (nd.getMonth()+1).toString().padStart(2,'0') + '_' + nd.getFullYear() + '_' + nd.getHours() + 'h' + nd.getMinutes() + '.txt';
    a.click();
}

// Restaurar log anterior ao carregar
(function() {
    try {
        const cache = JSON.parse(localStorage.getItem('anx_log_cache') || '[]');
        if (!cache.length) return;
        _anx_log_buffer = cache;
        const logEl = document.getElementById('anx-log');
        logEl.style.display = 'block';
        document.getElementById('btn-baixar-anx').style.display = 'inline-block';
        cache.forEach(txt => {
            const c = txt.includes('[RELACOES]') || txt.includes('Bloco') ? '#4fc3f7' : txt.includes('📎') || txt.includes('📦') || txt.includes('📄') || txt.includes('📋') ? '#ff9800' : txt.includes('❌') ? '#ff6b6b' : txt.includes('⚠️') ? '#ffb347' : txt.includes('✅') ? 'var(--accent)' : 'var(--muted)';
            logEl.innerHTML += `<div style="color:${c}">${txt}</div>`;
        });
        logEl.scrollTop = logEl.scrollHeight;
    } catch(e) {}
})();

async function analisarAnexo() {
    const municipio = document.getElementById('anx-municipio').value.trim();
    const estado = document.getElementById('anx-estado').value.trim().toUpperCase();
    const arquivo = document.getElementById('anx-arquivo').files[0];
    if (!arquivo) { alert('Selecione um arquivo'); return; }

    const btn = document.getElementById('btn-anx');
    btn.disabled = true; btn.textContent = '⏳ Analisando...';

    novaAnalise();
    const logEl = document.getElementById('anx-log');
    logEl.style.display = 'block';
    document.getElementById('anx-resultado').style.display = 'none';
    _anx_addLog('🚀 Iniciando análise de ' + arquivo.name, 'ok');

    const fd = new FormData();
    fd.append('arquivo', arquivo);
    fd.append('municipio', municipio || 'Municipio');
    fd.append('estado', estado || 'XX');

    try {
        const r = await fetch('/api/buscador/analisar-anexo', {method:'POST', body: fd, credentials:'same-origin'});
        const respText = await r.text();
        let d;
        try { d = JSON.parse(respText); } catch(e) {
            _anx_addLog('Erro do servidor: ' + respText.substring(0,200), 'erro');
            btn.disabled=false; btn.textContent='🔍 Analisar Anexos'; return;
        }
        if (!d.success) { alert('Erro: ' + d.error); btn.disabled=false; btn.textContent='🔍 Analisar Anexos'; return; }

        const jobId = d.job_id;
        let cursor = 0;
        while (true) {
            await new Promise(ok => setTimeout(ok, 1500));
            const poll = await fetch(`/api/buscador/job/${jobId}?cursor=${cursor}`).then(r=>r.json());
            if (poll.logs && poll.logs.length) {
                poll.logs.forEach(l => {
                    _anx_addLog(l.msg||'', l.nivel);
                });
            }
            cursor = poll.cursor || cursor;
            if (poll.done) {
                if (poll.result) mostrarResultado(poll.result);
                break;
            }
        }
    } catch(e) {
        logEl.innerHTML += `<div style="color:#ff6b6b">Erro: ${e}</div>`;
    }
    btn.disabled = false; btn.textContent = '🔍 Analisar Anexos';
}

function mostrarResultado(r) {
    const el = document.getElementById('anx-resultado');
    el.style.display = 'block';
    const campos = [
        ['Altera', r.altera],
        ['Revoga', r.revoga],
        ['Regulamenta', r.regulamenta],
        ['Alterado por', r.alterado_por],
        ['Revogado por', r.revogado_por],
        ['Regulamentado por', r.regulamentado_por],
        ['Faz referência à', r.cita],
    ];
    let h = '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    campos.forEach(([label, lista]) => {
        if (!lista || !lista.length) return;
        h += `<tr>
            <td style="padding:8px 12px;border:1px solid var(--border);color:var(--muted);width:180px;font-weight:600">${label}</td>
            <td style="padding:8px 12px;border:1px solid var(--border);white-space:pre-line">${lista.join('\n')}</td>
        </tr>`;
    });
    h += '</table>';
    document.getElementById('anx-tabela').innerHTML = h;
}
// Sobrescrever acSelecionar para tratar prefix anx
const _acSelecionarOrig = typeof acSelecionar !== 'undefined' ? acSelecionar : null;
function acSelecionar(el, prefix) {
    const nome = el.dataset.nome;
    const estado = el.dataset.estado;
    if (prefix === 'anx') {
        document.getElementById('anx-municipio').value = nome;
        document.getElementById('anx-estado').value = estado;
        document.getElementById('anx-ac-list').classList.remove('open');
        return;
    }
    if (_acSelecionarOrig) _acSelecionarOrig(el, prefix);
}
</script>
{% block title %}Análise de Anexos · UrbanLex{% endblock %}
