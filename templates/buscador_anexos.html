{% extends "base.html" %}
{% block title %}Análise de Legislação · UrbanLex{% endblock %}
{% block content %}
<style>
.ac-wrapper{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:6px;max-height:200px;overflow-y:auto;z-index:1000;display:none}
.ac-list.open{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--text)}
.ac-item.selected,.ac-item:hover{background:var(--surface)}
</style>
<div style="padding:24px;max-width:900px">
    <h2 style="color:var(--accent);margin-bottom:4px">📋 Análise de Legislação</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:24px">Upload de arquivos (ZIP, PDF, DOCX, XLS...) de uma ou mais legislações para analisar relações urbanísticas.</p>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
            <div>
                <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Município</label>
                <div class="ac-wrapper">
                    <input id="anx-municipio" type="text" placeholder="Ex: Rio de Janeiro" autocomplete="off"
                           style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"
                           oninput="anxAcBuscar(this.value)" onfocus="anxAcBuscar(this.value)" onkeydown="anxAcKeydown(event)">
                    <div class="ac-list" id="anx-ac-list"></div>
                </div>
            </div>
            <div>
                <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Estado</label>
                <input id="anx-estado" type="text" placeholder="Preenchido automaticamente" readonly
                       style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;opacity:0.7">
            </div>
        </div>
        <div style="margin-bottom:12px">
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Arquivo(s)</label>
            <input id="anx-arquivo" type="file" accept=".zip,.pdf,.docx,.doc,.xlsx,.xls,.jpg,.jpeg,.png" multiple
                   style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
        </div>
        <button onclick="analisarAnexo()" id="btn-anx" class="btn btn-primary">🔍 Analisar Anexos</button>
        <button onclick="novaAnalise()" class="btn btn-secondary" style="margin-left:8px">🔄 Nova Análise</button>
        <button onclick="baixarLogAnexo()" id="btn-baixar-anx" class="btn btn-secondary" style="margin-left:8px;display:none">📥 Baixar Log .txt</button>
    </div>
    <div id="anx-log" style="display:none;background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:11px;max-height:400px;overflow-y:auto;margin-bottom:20px"></div>
    <div id="anx-resultado" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px">
        <h3 style="color:var(--accent);margin-bottom:16px">📊 Resultado da Análise</h3>
        <div id="anx-tabela"></div>
    </div>
</div>
<script>
let _anxLogBuffer = [];
let _anxAcTimer = null, _anxAcCache = {}, _anxAcIdx = -1;
let _anxJobId = null, _anxCursor = 0, _anxPolling = false;

async function _anxStartPolling(jobId, cursor) {
    if (_anxPolling) return;
    _anxPolling = true;
    _anxJobId = jobId;
    _anxCursor = cursor || 0;
    let erros = 0;
    while (_anxPolling) {
        await new Promise(ok => setTimeout(ok, 2000));
        if (document.hidden) {
            await new Promise(ok => {
                const h = () => { if (!document.hidden) { document.removeEventListener('visibilitychange', h); ok(); } };
                document.addEventListener('visibilitychange', h);
            });
        }
        try {
            const poll = await fetch('/api/buscador/job/' + _anxJobId + '?cursor=' + _anxCursor, {credentials: 'same-origin'}).then(r => r.json());
            erros = 0;
            if (poll.logs && poll.logs.length) {
                poll.logs.forEach(l => anxAddLog(l.msg || '', l.nivel));
                document.getElementById('btn-baixar-anx').style.display = 'inline-block';
            }
            _anxCursor = poll.cursor || _anxCursor;
            if (poll.done) {
                document.getElementById('btn-baixar-anx').style.display = 'inline-block';
                if (poll.result) mostrarResultado(poll.result);
                _anxPolling = false;
                break;
            }
        } catch(e) {
            if (document.hidden) continue;
            erros++;
            if (erros <= 3) anxAddLog('Reconectando... (tentativa ' + erros + ')', 'aviso');
            if (erros >= 60) {
                anxAddLog('Conexão perdida — o processamento continua no servidor. Recarregue a página para ver o resultado.', 'aviso');
                _anxPolling = false;
                break;
            }
            await new Promise(ok => setTimeout(ok, 3000));
        }
    }
}

window.addEventListener('pageshow', e => {
    if (e.persisted && _anxJobId && !_anxPolling) {
        anxAddLog('Retomando após navegação...', 'aviso');
        _anxStartPolling(_anxJobId, _anxCursor);
    }
});

function anxAddLog(msg, nivel) {
    const logEl = document.getElementById('anx-log');
    const c = nivel==='erro'?'#ff6b6b':nivel==='aviso'?'#ffb347':nivel==='ok'?'var(--accent)':nivel==='relacao'?'#4fc3f7':nivel==='anexo'?'#ff9800':'var(--muted)';
    const ts = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/Sao_Paulo'});
    const txt = '['+ts+'] '+(msg||'');
    _anxLogBuffer.push(txt);
    logEl.innerHTML += '<div style="color:'+c+'">'+txt+'</div>';
    logEl.scrollTop = logEl.scrollHeight;
    try { localStorage.setItem('anx_log_cache', JSON.stringify(_anxLogBuffer)); } catch(e) {}
}

function novaAnalise() {
    _anxLogBuffer = [];
    localStorage.removeItem('anx_log_cache');
    localStorage.removeItem('anx_job_id');
    document.getElementById('anx-log').innerHTML = '';
    document.getElementById('anx-log').style.display = 'none';
    document.getElementById('anx-resultado').style.display = 'none';
    document.getElementById('btn-baixar-anx').style.display = 'none';
    document.getElementById('anx-arquivo').value = '';
}

function baixarLogAnexo() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([_anxLogBuffer.join('\n')],{type:'text/plain'}));
    const nd = new Date();
    a.download = 'Log_anexos_'+nd.getDate().toString().padStart(2,'0')+'_'+(nd.getMonth()+1).toString().padStart(2,'0')+'_'+nd.getFullYear()+'_'+nd.getHours()+'h'+nd.getMinutes()+'.txt';
    a.click();
}

async function analisarAnexo() {
    const arquivo = document.getElementById('anx-arquivo').files[0];
    if (!arquivo) { alert('Selecione um arquivo'); return; }
    const municipio = document.getElementById('anx-municipio').value.trim();
    const estado = document.getElementById('anx-estado').value.trim();
    const btn = document.getElementById('btn-anx');
    btn.disabled = true; btn.textContent = '⏳ Analisando...';
    novaAnalise();
    document.getElementById('anx-log').style.display = 'block';
    anxAddLog('🚀 Iniciando análise de '+arquivo.name, 'ok');
    const fd = new FormData();
    fd.append('arquivo', arquivo);
    fd.append('municipio', municipio||'Municipio');
    fd.append('estado', estado||'XX');
    try {
        const resp = await fetch('/api/buscador/analisar-anexo',{method:'POST',body:fd,credentials:'same-origin'});
        const txt = await resp.text();
        let d;
        try { d = JSON.parse(txt); } catch(e) { anxAddLog('Erro do servidor: '+txt.substring(0,200),'erro'); btn.disabled=false; btn.textContent='🔍 Analisar Anexos'; return; }
        if (!d.success) { anxAddLog('Erro: '+(d.error||'desconhecido'),'erro'); btn.disabled=false; btn.textContent='🔍 Analisar Anexos'; return; }
        localStorage.setItem('anx_job_id', d.job_id);
        sessionStorage.setItem('anx_job_sessao', d.job_id);
        _anxStartPolling(d.job_id, 0);
        await new Promise(ok => {
            const _check = setInterval(() => { if (!_anxPolling) { clearInterval(_check); ok(); } }, 1000);
        });
    } catch(e) { anxAddLog('Erro: '+e,'erro'); }
    document.getElementById('btn-baixar-anx').style.display = 'inline-block';
    btn.disabled = false; btn.textContent = '🔍 Analisar Anexos';
}

function mostrarResultado(r) {
    const el = document.getElementById('anx-resultado');
    el.style.display = 'block';
    const campos = [['Altera',r.altera],['Revoga',r.revoga],['Regulamenta',r.regulamenta],['Alterado por',r.alterado_por],['Revogado por',r.revogado_por],['Regulamentado por',r.regulamentado_por],['Faz referência à',r.cita]];
    // Tabela de contexto das citacoes
    if (r.contexto_citas && r.contexto_citas.length) {
        let hctx = '<h4 style="color:var(--accent);margin:20px 0 10px">📍 Contexto das Legislações Citadas</h4>';
        hctx += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
        hctx += '<tr><th style="padding:8px 12px;border:1px solid var(--border);background:var(--surface2);text-align:left">Legislação</th><th style="padding:8px 12px;border:1px solid var(--border);background:var(--surface2);text-align:left">Zonas/Subzonas</th><th style="padding:8px 12px;border:1px solid var(--border);background:var(--surface2);text-align:left">Contexto</th><th style="padding:8px 12px;border:1px solid var(--border);background:var(--surface2);text-align:left">Principal?</th></tr>';
        r.contexto_citas.forEach(ct => {
            hctx += '<tr>';
            hctx += '<td style="padding:8px 12px;border:1px solid var(--border)">' + (ct.lei||'') + '</td>';
            hctx += '<td style="padding:8px 12px;border:1px solid var(--border);white-space:pre-line">' + ((ct.zonas||[]).join('\n')||'—') + '</td>';
            hctx += '<td style="padding:8px 12px;border:1px solid var(--border)">' + (ct.contexto||'—') + '</td>';
            hctx += '<td style="padding:8px 12px;border:1px solid var(--border);text-align:center">' + (ct.lei_principal ? '✅' : '—') + '</td>';
            hctx += '</tr>';
        });
        hctx += '</table>';
        document.getElementById('anx-tabela').innerHTML += hctx;
    }
    let h = '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    campos.forEach(([label,lista]) => {
        if (!lista||!lista.length) return;
        h += '<tr><td style="padding:8px 12px;border:1px solid var(--border);color:var(--muted);width:180px;font-weight:600">'+label+'</td><td style="padding:8px 12px;border:1px solid var(--border);white-space:pre-line">'+lista.join('\n')+'</td></tr>';
    });
    h += '</table>';
    document.getElementById('anx-tabela').innerHTML = h;

    // Zonas e subzonas
    if (r.zonas_analise && r.zonas_analise.tem_zonas) {
        const za = r.zonas_analise;
        let hz = '<h4 style="color:var(--accent);margin:20px 0 10px">\U0001f5fa\ufe0f Zonas e Subzonas do Mun\u00edcipio</h4>';
        hz += '<p style="font-size:12px;margin-bottom:8px"><strong>Agrupamento:</strong> ' + (za.agrupamento || '\u2014') + '</p>';
        if (za.subzonas && za.subzonas.length) {
            const grupos = {};
            za.subzonas.forEach(sz => {
                const div = sz.divisao || 'Geral';
                if (!grupos[div]) grupos[div] = [];
                grupos[div].push(sz);
            });
            Object.entries(grupos).forEach(([div, szs]) => {
                if (Object.keys(grupos).length > 1) {
                    hz += '<h5 style="color:var(--text);margin:12px 0 6px;font-size:12px">' + div + '</h5>';
                }
                hz += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px">';
                hz += '<tr><th style="padding:8px 12px;border:1px solid var(--border);background:var(--surface2);text-align:left;width:120px">Subzona</th><th style="padding:8px 12px;border:1px solid var(--border);background:var(--surface2);text-align:left">Usos Permitidos</th></tr>';
                szs.forEach(sz => {
                    hz += '<tr><td style="padding:8px 12px;border:1px solid var(--border);font-weight:600;white-space:nowrap">' + (sz.subzona||'') + '</td>';
                    hz += '<td style="padding:8px 12px;border:1px solid var(--border)">' + (sz.usos||'\u2014') + '</td></tr>';
                });
                hz += '</table>';
            });
        }
        document.getElementById('anx-tabela').innerHTML += hz;
    }
}

// Autocomplete
async function anxAcBuscar(query) {
    const listEl = document.getElementById('anx-ac-list');
    query = (query||'').trim();
    if (query.length < 2) { listEl.classList.remove('open'); return; }
    clearTimeout(_anxAcTimer);
    _anxAcTimer = setTimeout(async () => {
        let items = _anxAcCache[query.toLowerCase()];
        if (!items) {
            try {
                const r = await fetch('/api/buscador/autocomplete-municipios?q='+encodeURIComponent(query),{credentials:'same-origin'});
                const d = await r.json();
                items = d.municipios || [];
                _anxAcCache[query.toLowerCase()] = items;
            } catch(e) { items = []; }
        }
        if (!items.length) { listEl.innerHTML='<div style="padding:8px;font-size:12px;color:var(--muted)">Nenhum município encontrado</div>'; listEl.classList.add('open'); return; }
        _anxAcIdx = -1;
        listEl.innerHTML = items.map(m=>'<div class="ac-item" data-nome="'+m.nome+'" data-estado="'+m.estado+'" onclick="anxAcSelecionar(this)" onmouseenter="this.classList.add(\'selected\')" onmouseleave="this.classList.remove(\'selected\')"><span style="color:var(--muted);margin-right:6px">'+m.estado+'</span>'+m.nome+'</div>').join('');
        listEl.classList.add('open');
    }, 200);
}

function anxAcKeydown(e) {
    const listEl = document.getElementById('anx-ac-list');
    const items = listEl.querySelectorAll('.ac-item');
    if (!items.length || !listEl.classList.contains('open')) return;
    if (e.key==='ArrowDown') { e.preventDefault(); _anxAcIdx=Math.min(_anxAcIdx+1,items.length-1); items.forEach((it,i)=>it.classList.toggle('selected',i===_anxAcIdx)); items[_anxAcIdx].scrollIntoView({block:'nearest'}); }
    else if (e.key==='ArrowUp') { e.preventDefault(); _anxAcIdx=Math.max(_anxAcIdx-1,0); items.forEach((it,i)=>it.classList.toggle('selected',i===_anxAcIdx)); items[_anxAcIdx].scrollIntoView({block:'nearest'}); }
    else if (e.key==='Enter'&&_anxAcIdx>=0) { e.preventDefault(); anxAcSelecionar(items[_anxAcIdx]); }
    else if (e.key==='Escape') { listEl.classList.remove('open'); }
}

function anxAcSelecionar(el) {
    document.getElementById('anx-municipio').value = el.dataset.nome;
    document.getElementById('anx-estado').value = el.dataset.estado;
    document.getElementById('anx-ac-list').classList.remove('open');
}

document.addEventListener('click', e => {
    if (!e.target.closest('.ac-wrapper')) document.getElementById('anx-ac-list').classList.remove('open');
});

// Restaurar log anterior e reconectar job se ainda em andamento
(async function(){
    try {
        const jobId = localStorage.getItem('anx_job_id');
        const cache = JSON.parse(localStorage.getItem('anx_log_cache')||'[]');
        if (!cache.length && !jobId) return;
        _anxLogBuffer = cache;
        const logEl = document.getElementById('anx-log');
        logEl.style.display = 'block';
        const _btnBaixar = document.getElementById('btn-baixar-anx');
        if (_btnBaixar) _btnBaixar.style.display = 'inline-block';
        cache.forEach(txt => { logEl.innerHTML += '<div style="color:var(--text)">'+txt+'</div>'; });
        logEl.scrollTop = logEl.scrollHeight;
        // Tentar reconectar job ativo
        const _jobSessao = sessionStorage.getItem('anx_job_sessao');
        if (jobId && jobId !== _jobSessao) {
            try {
                const check = await fetch('/api/buscador/job/'+jobId+'?cursor='+(cache.length||0),{credentials:'same-origin'}).then(r=>r.json());
                if (check && !check.error) {
                    if (check.logs && check.logs.length) {
                        check.logs.forEach(l => { if (l.nivel !== 'tabela') anxAddLog(l.msg||'', l.nivel); });
                    }
                    if (check.done) {
                        document.getElementById('btn-baixar-anx').style.display = 'inline-block';
                        if (check.result) mostrarResultado(check.result);
                    } else {
                        _anxStartPolling(jobId, check.cursor || (cache.length||0));
                    }
                }
            } catch(e) {}
        }
    } catch(e){}
})();
</script>
{% endblock %}
